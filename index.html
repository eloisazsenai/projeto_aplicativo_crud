<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicação para cadastro e organização de livros.">
    <title>Minha Estante | Cadastro de livros</title>

    <!-- type="module" permite que cadastro.js importe os outros arquivos JavaScript. -->
    <script type="module" src="js/cadastro.js"></script>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>
    <header class="cabecalho">
        <div class="cabecalho-conteudo">
            <p class="etiqueta">Biblioteca pessoal</p>
            <h1>Minha Estante</h1>
            <p class="subtitulo">Cadastre e organize suas próximas leituras.</p>
        </div>
    </header>

    <main id="geral" class="conteudo">
        <section id="secao-form" class="painel painel-formulario" aria-labelledby="titulo-formulario">
            <div class="titulo-secao">
                <div>
                    <h2 id="titulo-formulario">Novo livro</h2>
                </div>
                <span id="modo-formulario" class="selo">Cadastro</span>
            </div>

            <form id="form-livro">
                <div class="campo campo-largo">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Ex.: O Pequeno Príncipe" required maxlength="300" minlength="1">
                </div>

                <!-- Campo extra criado para registrar a nota pessoal do livro. -->
                <div class="campo campo-largo">
                    <label for="avaliacao">Avaliação</label>
                    <select id="avaliacao" name="avaliacao" required>
                        <option value="">Selecione uma nota</option>
                        <option value="1">1 estrela</option>
                        <option value="2">2 estrelas</option>
                        <option value="3">3 estrelas</option>
                        <option value="4">4 estrelas</option>
                        <option value="5">5 estrelas</option>
                    </select>
                </div>

                <div class="campo campo-largo">
                    <label for="autor">Autor</label>
                    <input type="text" id="autor" name="autor" placeholder="Ex.: Antoine de Saint-Exupéry" required maxlength="150" minlength="1">
                </div>

                <div class="linha-campos">
                    <div class="campo">
                        <label for="ano">Ano</label>
                        <input type="number" id="ano" name="ano" placeholder="1943" required max="2026" min="1" step="1">
                    </div>

                    <div class="campo">
                        <label for="genero">Gênero</label>
                        <input type="text" id="genero" name="genero" placeholder="Ficção" required maxlength="70" minlength="2"> 
                    </div>
                </div>

                <div class="campo campo-largo">
                    <label for="resumo">Resumo</label>
                    <textarea name="resumo" id="resumo" placeholder="Escreva um pequeno resumo do livro" required minlength="10"></textarea>
                </div>

                <div class="acoes-formulario">
                    <button class="botao botao-principal" id="adicionar" type="submit">Adicionar livro</button>
                    <button class="botao botao-secundario" id="limpar" type="reset">Limpar</button>
                </div>
            </form>
        </section>

        <section id="secao-lista" class="painel painel-lista" aria-labelledby="titulo-lista">
            <div class="cabecalho-lista">
                <div class="titulo-secao">
                    <div>
                        <h2 id="titulo-lista">Livros cadastrados</h2>
                        <p id="contador-livros" class="contador">0 livros</p>
                    </div>
                </div>

            </div>

            <!-- Controles dos bônus usados para pesquisar e ordenar os livros. -->
            <div class="controles-lista">
                <div class="campo-pesquisa">
                    <label for="pesquisa">Pesquisar pelo título</label>
                    <input type="search" id="pesquisa" name="pesquisa" placeholder="Digite o título do livro">
                </div>

                <div class="campo-ordenacao">
                    <label for="ordenacao">Ordenar por</label>
                    <select id="ordenacao" name="ordenacao">
                        <option value="cadastro">Ordem de cadastro</option>
                        <option value="titulo-az">Título: A a Z</option>
                        <option value="titulo-za">Título: Z a A</option>
                        <option value="autor-az">Autor: A a Z</option>
                        <option value="ano-recente">Ano: mais recente</option>
                        <option value="ano-antigo">Ano: mais antigo</option>
                    </select>
                </div>
            </div>

            <div id="div-lista-livros" class="lista-livros"></div>
        </section>
    </main>

    <div id="mensagem" class="mensagem" role="status" aria-live="polite"></div>
</body>
</html>
